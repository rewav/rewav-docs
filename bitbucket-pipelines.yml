image: atlassian/default-image:4

pipelines:
  branches:
    main:
      - step:
          name: Build Plugin ZIP
          script:
            - apt-get update && apt-get install -y zip rsync
            - export PLUGIN_SLUG="rewav-docs"
            - mkdir -p build/${PLUGIN_SLUG}
            - rsync -rc --exclude-from=.distignore ./ build/${PLUGIN_SLUG}/
            - cd build
            - zip -r ../${PLUGIN_SLUG}.zip ${PLUGIN_SLUG}
          artifacts:
            - rewav-docs.zip
